<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>The Romo Cup | The Teams</title>
    <meta name="description" content="Meet the Romo Cup teams and follow tournament progress supporting the Will Romanowski Endowed Scholarship at Auburn University." />
    <meta property="og:title" content="The Teams | The Romo Cup" />
    <meta property="og:description" content="Explore Romo Cup teams competing to support the Will Romanowski Endowed Scholarship at Auburn University." />
    <meta property="og:image" content="https://theromocup.com/assets/images/romo-team-night.jpg" />
    <meta property="og:url" content="https://theromocup.com/teams/" />
    <meta property="og:type" content="website" />
    <link rel="icon" type="image/jpeg" href="/assets/IMG_5206.jpg" />
    <link rel="apple-touch-icon" href="/assets/IMG_5206.jpg" />
    <link rel="stylesheet" href="/styles.css" />
    <script src="/logo-fallback.js" defer></script>
  </head>
  <body class="teams-page">
    <header class="site-header">
      <div class="container">
        <nav class="nav" aria-label="Primary">
          <a class="brand-wrap" href="/" aria-label="The Romo Cup home">
            <img
              class="brand-logo logo-image"
              src="/assets/IMG_5206.jpg"
              alt="The Romo Cup logo"
              width="74"
              height="74"
              decoding="async"
            />
            <p class="brand-title">The Romo Cup</p>
          </a>
          <ul class="nav-list">
            <li><a href="https://give.auburn.edu/campaigns/the-will-romanowski-scholarship-fund/?appeal_id=699e1127aa0a1dcb6645dd9e">Donate</a></li>
            <li><a href="/about/">About Romo</a></li>
            <li><a href="/teams/" aria-current="page">The Teams</a></li>
            <li><a href="/bracket.html">Bracket</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="main-content teams-main">
      <div class="container">
        <section class="teams-hero reveal">
          <div class="teams-hero-copy">
            <span class="teams-kicker">Tournament Lineup</span>
            <h1>Romo Cup Teams</h1>
            <p>Meet the squads competing for the cup.</p>
          </div>
          <div class="teams-hero-accent" aria-hidden="true">
            <span></span>
            <span></span>
            <span></span>
          </div>
        </section>

        <section class="teams-roster-section reveal">
          <div class="team-grid" id="team-grid"></div>
        </section>
      </div>
    </main>

    <footer class="site-footer">
      <div class="container footer-inner">
        <div class="footer-top">
          <p>Contact: <a href="mailto:romocup@gmail.com">romocup@gmail.com</a></p>
          <p class="small">The Romo Cup</p>
          <p class="small">For the betterment of Auburn</p>
        </div>
        <small>&copy; 2026 The Romo Cup. All rights reserved.</small>
      </div>
    </footer>

    <script>
      const teamData = [
        { name: "ATO", seed: "01", roster: ["TBD"] },
        { name: "KA", seed: "02", roster: ["TBD"] },
        { name: "Sigma Nu", seed: "03", roster: ["TBD"] },
        { name: "Fiji", seed: "04", roster: ["TBD"] },
        { name: "Phi Delt", seed: "05", roster: ["TBD"] },
        {
          name: "Lambda Chi",
          seed: "06",
          roster: [
            "Jackson Greene",
            "Connor Harris",
            "Wyatt Reuter",
            "Landon Harper",
            "Braxton Sherling",
            "Connor Bain",
            "Walker Hilton",
            "Cannon Hopper",
            "Aaron Reeves",
            "Brannon Spencer",
            "Eliot Mack",
            "Kyle Crisp"
          ]
        },
        { name: "Farmhouse", seed: "07", roster: ["TBD"] },
        { name: "SAE", seed: "08", roster: ["TBD"] }
      ];

      const teamGrid = document.getElementById("team-grid");

      teamGrid.innerHTML = teamData
        .map((team, index) => {
          const rosterItems = team.roster
            .map((player) => `<li class="team-roster-item">${player}</li>`)
            .join("");

          return `
            <article class="team-card reveal" style="transition-delay: ${index * 45}ms">
              <div class="team-card-top">
                <span class="team-seed">${team.seed}</span>
                <div class="team-title-block">
                  <p class="team-label">Roster</p>
                  <h2>${team.name}</h2>
                </div>
              </div>
              <ul class="team-roster-list" aria-label="${team.name} roster">
                ${rosterItems}
              </ul>
            </article>
          `;
        })
        .join("");

      const revealObserver = new IntersectionObserver(
        (entries) => {
          entries.forEach((entry) => {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              revealObserver.unobserve(entry.target);
            }
          });
        },
        { threshold: 0.14 }
      );

      document.querySelectorAll(".reveal").forEach((el) => revealObserver.observe(el));
    </script>
  </body>
</html>
